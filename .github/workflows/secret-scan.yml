name: Secret Scan

# Three triggers, three scan shapes:
#   - pull_request   → scan the diff against the PR's base branch.
#                      Blocks leaks before they land on main.
#   - push to main   → scan the new commits against their parent so a
#                      direct push (hotfix, merge commit) still gets a
#                      pass. Using the default branch here would
#                      compare main against itself and scan nothing.
#   - schedule       → weekly full-repo scan as a safety net for
#                      anything that predates this workflow or slipped
#                      through due to commit-range edge cases.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'   # 09:00 UTC every Monday
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so the base..head diff can actually be
          # computed. Shallow checkouts skip most history and the
          # scanner silently finds nothing.
          fetch-depth: 0

      - name: Determine scan range (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "SCAN_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "SCAN_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - name: Determine scan range (push)
        if: github.event_name == 'push'
        run: |
          # github.event.before is the previous HEAD of the branch we
          # just pushed to. On a first push to a branch it's
          # 0000000...0 (no parent) — fall back to scanning just HEAD
          # in that case.
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "SCAN_BASE=" >> $GITHUB_ENV
          else
            echo "SCAN_BASE=$BEFORE" >> $GITHUB_ENV
          fi
          echo "SCAN_HEAD=${{ github.sha }}" >> $GITHUB_ENV

      - name: TruffleHog (diff mode, PR + push)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ env.SCAN_BASE }}
          head: ${{ env.SCAN_HEAD }}
          # --results=verified,unknown drops low-signal unauthenticated
          # detectors (many of which are deprecated by their upstream
          # services and just noise up the CI output).
          extra_args: --results=verified,unknown

      - name: TruffleHog (full repo, weekly + manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
